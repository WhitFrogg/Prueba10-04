<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veterinaria Perla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success p-3">
    <a href="#" class="navbar-brand">Perla</a>
    <div>
        <a href="#inicio" class="text-white me-2">Inicio</a>
        <a href="#servicios" class="text-white me-2">Servicios</a>
        <a href="#cita" class="text-white me-2">Reservar hora</a>
        <a href="#contacto" class="text-white">Contacto</a>
    </div>
</nav>

<section id="inicio" class="text-center hero">
    <h1>Veterinaria Perla</h1>
    <p>Cuidamos a sus mascotas</p>
    <img src="img/perrosygatos.avif" class="img-fluid mt-3 rounded shadow" alt="Mascotas">
    <div class="card card-simple mx-auto mt-3" style="width: 18rem;">
        <div class="card-body">
            <p>Atencion 24/7 para sus mascotas</p>
        </div>
    </div>
</section>

<section id="servicios" class="seccion text-center">
    <h2>Servicios</h2>
    <p>Consulta - Vacunas - Cirugias</p>
</section>

<section id="cita" class="seccion">
    <h2 class="text-center">Reservar hora</h2>
    <form>
        <input class="form-control mb-2" type="text" placeholder="Nombre del dueño" required>
        <input class="form-control mb-2" type="text" placeholder="Nombre de la mascota" required>
        <input class="form-control mb-2" type="text" placeholder="Especie" required>
        <input class="form-control mb-2" type="number" placeholder="Edad de la mascota" required>
        <input class="form-control mb-2" type="date" required>
        <input class="form-control mb-2" type="time" required>
        <textarea class="form-control mb-2" placeholder="Motivo de la consulta" required></textarea>
        <button class="btn btn-success">Enviar</button>
    </form>
</section>

<section id="contacto" class="seccion">
    <h2 class="text-center">Contacto</h2>
    <form>
        <input class="form-control mb-2" type="text" placeholder="Nombre" required>
        <input class="form-control mb-2" type="email" placeholder="Correo" required>
        <textarea class="form-control mb-2" placeholder="Mensaje" required></textarea>
        <button class="btn btn-success">Enviar</button>
    </form>
</section>

<footer class="text-center bg-success text-white p-3">
    <p>Benjamin Cerda</p>
    <p>GitHub: <a href="https://github.com/WhitFrogg" class="text-white">https://github.com/WhitFrogg</a></p>
</footer>

</body>
</html>
